apiVersion: argoproj.io/v1alpha1

kind: Application

metadata:
  name: to-do-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/ImArcho/to-do-app.git
    targetRevision: pull-model
    path: manifests

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true