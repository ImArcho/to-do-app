apiVersion: apps/v1
kind: Deployment
metadata:
  name: to-do-app
  namespace: default
  labels:
    app: to-do-app
spec:
  replicas: 5
  selector:
    matchLabels:
      app: to-do-app
  template:
    metadata:
      labels:
        app: to-do-app
    spec:
      containers:
        - name: to-do-app
          image: imarcho/myapp:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: SQLITE_DB_LOCATION
              value: "/data/todos.db"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}