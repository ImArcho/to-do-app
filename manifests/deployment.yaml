apiVersion: apps/v1
kind: Deployment
metadata:
  name: to-do-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: to-do-app
  template:
    metadata:
      labels:
        app: to-do-app
    spec:
      containers:
        - name: to-do-app
          image: temmojef/myapp:v1
          imagePullPolicy: Always
          command: ["node", "src/index.js"]
          ports:
          - containerPort: 3000