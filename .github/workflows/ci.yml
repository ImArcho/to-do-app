---
"on":
  push:
    branches: pull-model

jobs:
  Setup_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Node cache
        uses: actions/cache@v3
        with:
          path: ./app/node_modules
          key: yarn-${{ hashFiles('app/yarn.lock') }}-${{ runner.os }}

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20.x

      - name: YARN install
        working-directory: ./app
        run: yarn install

      - name: Test
        working-directory: ./app
        env:
          SQLITE_DB_LOCATION: /tmp/todos/test.db
        run: mkdir -p /tmp/todos && yarn test

  Build_scan_push:
    needs: Setup_and_test
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PERSONAL_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            temmojef/myapp:${{ github.sha }}
            temmojef/myapp:latest

      - name: Run Trivy
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: 'temmojef/myapp:${{ github.sha }}'
          format: 'sarif'
          exit-code: 0
          output: 'trivy-results.sarif'

      - name: Results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Update manifest with new image tag
        run: |
          sed -i "s|image: temmojef/myapp:.*|image: temmojef/myapp:${{ github.sha }}|g" manifests/deployment.yaml
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add manifests/deployment.yaml
          git commit -m "Update image to ${{ github.sha }}" || echo "No changes to commit"
          git push